<!DOCTYPE html><html lang="en">
<head>
<meta charset="UTF-8">
<title>Happy Birthday Soma ❤️</title><style>

body{
margin:0;
padding:0;
overflow:hidden;
font-family:Arial;
color:white;
text-align:center;
background:black;
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
}

canvas{
position:fixed;
top:0;
left:0;
z-index:-1;
}

h1{
font-size:50px;
color:#ff66cc;
text-shadow:0 0 25px pink;
}

button{
padding:15px 35px;
font-size:18px;
border:none;
border-radius:10px;
background:#ff4da6;
color:white;
cursor:pointer;
margin-top:20px;
}

#gift{
font-size:70px;
display:none;
cursor:pointer;
margin-top:20px;
}

#cake{
font-size:80px;
display:none;
cursor:pointer;
}

#letter{
display:none;
max-width:700px;
font-size:20px;
margin-top:20px;
white-space:pre-line;
}

.heart{
position:fixed;
font-size:22px;
color:red;
animation:fall 5s linear infinite;
}

@keyframes fall{
0%{transform:translateY(-10vh);}
100%{transform:translateY(110vh);}
}

</style></head><body><h1>🎂 Happy Birthday Soma ❤️</h1><button onclick="start()">Start Your Surprise</button>

<div id="gift" onclick="showCake()">🎁</div><div id="cake" onclick="openLetter()">🎂</div><div id="letter"></div>
  <audio controls autoplay loop>
<source src="song.mp3" type="audio/mpeg">
</audio>

<script>
function start(){
document.querySelector("button").style.display="none";
document.getElementById("gift").style.display="block";

var music = document.getElementById("song");
music.play();

heartRain();
}
</script><canvas id="stars"></canvas>

<script>

function start(){
document.querySelector("button").style.display="none";
document.getElementById("gift").style.display="block";
document.getElementById("song").play();
heartRain();
}

function showCake(){
document.getElementById("gift").style.display="none";
document.getElementById("cake").style.display="block";
}

function openLetter(){

document.getElementById("cake").style.display="none";

const text=`My Dearest Soma ❤️

The moment you entered my life,
everything became brighter and more beautiful.

Your smile is my favorite sight,
your voice is my favorite sound,
and your happiness means everything to me.

Today is the birthday of the most special girl
who makes my world magical.

I am grateful for every moment
we have spent together in this one year of friendship.

You are my happiness,
my peace,
and the most beautiful part of my life.

💖 Happy Birthday Soma 💖

I promise to always care for you,
support you,
and stand beside you forever.

Forever Yours ❤️`;

let i=0;
let letter=document.getElementById("letter");
letter.style.display="block";

function typing(){
if(i<text.length){
letter.innerHTML+=text.charAt(i);
i++;
setTimeout(typing,40);
}
}

typing();
fireworks();
}

function heartRain(){
setInterval(()=>{
let heart=document.createElement("div");
heart.className="heart";
heart.innerHTML="❤️";
heart.style.left=Math.random()*100+"vw";
heart.style.fontSize=(Math.random()*20+20)+"px";
document.body.appendChild(heart);
setTimeout(()=>heart.remove(),5000);
},300);
}

const canvas=document.getElementById("stars");
const ctx=canvas.getContext("2d");

canvas.width=window.innerWidth;
canvas.height=window.innerHeight;

let stars=[];

for(let i=0;i<250;i++){
stars.push({
x:Math.random()*canvas.width,
y:Math.random()*canvas.height,
size:Math.random()*2
});
}

function drawStars(){

ctx.clearRect(0,0,canvas.width,canvas.height);
ctx.fillStyle="white";

stars.forEach(star=>{
ctx.beginPath();
ctx.arc(star.x,star.y,star.size,0,Math.PI*2);
ctx.fill();
});

requestAnimationFrame(drawStars);
}

drawStars();

function fireworks(){

setInterval(()=>{

for(let i=0;i<30;i++){

let spark=document.createElement("div");

spark.style.position="fixed";
spark.style.width="6px";
spark.style.height="6px";
spark.style.background="yellow";
spark.style.borderRadius="50%";

spark.style.left=Math.random()*window.innerWidth+"px";
spark.style.top=Math.random()*window.innerHeight+"px";

document.body.appendChild(spark);

setTimeout(()=>spark.remove(),800);

}

},400);

}

</script></body>
</html>
