<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<title>Happy Birthday Soma ❤️</title>

<style>

body{
margin:0;
padding:0;
background:black;
color:white;
font-family:Arial;
text-align:center;
overflow:hidden;
}

/* stars */

.star{
position:absolute;
width:2px;
height:2px;
background:white;
border-radius:50%;
animation:twinkle 2s infinite alternate;
}

@keyframes twinkle{
from{opacity:0.2;}
to{opacity:1;}
}

/* hearts */

.heart{
position:fixed;
top:-10px;
font-size:22px;
animation:fall linear infinite;
}

@keyframes fall{
to{
transform:translateY(100vh);
}
}

h1{
margin-top:120px;
font-size:60px;
color:#ff4d6d;
}

/* cake */

.cake{
margin:40px auto;
width:150px;
cursor:pointer;
}

.layer{
height:40px;
background:pink;
border-radius:10px;
margin:5px;
}

.candle{
width:10px;
height:30px;
background:white;
margin:auto;
}

.flame{
width:10px;
height:10px;
background:orange;
border-radius:50%;
animation:flicker 0.5s infinite alternate;
}

@keyframes flicker{
from{transform:scale(1);}
to{transform:scale(1.4);}
}

#letter{
width:80%;
margin:auto;
margin-top:20px;
font-size:18px;
color:#ffd166;
min-height:100px;
}

button{
padding:12px 25px;
border:none;
border-radius:8px;
background:#ff4d6d;
color:white;
font-size:18px;
cursor:pointer;
margin-top:20px;
}

</style>

</head>

<body>

<h1>🎂 Happy Birthday Soma ❤️</h1>

<p>Click the cake to cut it 🎂</p>

<div class="cake" onclick="cutCake()">

<div class="candle">
<div class="flame" id="flame"></div>
</div>

<div class="layer"></div>
<div class="layer"></div>

</div>

<div id="letter"></div>

<audio controls autoplay loop>
<source src="music/song.mp3" type="audio/mp3">
</audio>

<script>

/* stars */

for(let i=0;i<120;i++){

let star=document.createElement("div")
star.className="star"

star.style.left=Math.random()*100+"vw"
star.style.top=Math.random()*100+"vh"

document.body.appendChild(star)

}

/* hearts */

setInterval(()=>{

let heart=document.createElement("div")

heart.className="heart"
heart.innerHTML="❤️"

heart.style.left=Math.random()*100+"vw"
heart.style.animationDuration=(Math.random()*3+2)+"s"

document.body.appendChild(heart)

setTimeout(()=>heart.remove(),5000)

},300)

/* cake */

function cutCake(){

document.getElementById("flame").style.display="none"

typeLetter()

}

/* typing letter */

let text=`Happy Birthday, Soma ❤️

Dear Soma,

Happy Birthday to the most special girl in my life. Today is not only your birthday, but it also marks one beautiful year of our friendship.

This one year with you has been full of beautiful moments, laughter, and memories that I will always cherish.

Your smile has a magical way of making my day better, and your presence makes everything feel brighter.

You are someone very special to me and I feel lucky to have you in my life.

I wish your life is always filled with happiness, success and love.

Happy Birthday once again Soma ❤️`

let i=0

function typeLetter(){

let speed=40

function typing(){

if(i<text.length){

document.getElementById("letter").innerHTML+=text.charAt(i)

i++

setTimeout(typing,speed)

}

}

typing()

}

</script>

</body>
</html>
