<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Happy Birthday ❤️</title>

<style>
body{
    margin:0;
    padding:0;
    text-align:center;
    font-family:Arial;
    background:linear-gradient(45deg,#ff9a9e,#fad0c4);
    overflow-x:hidden;
}

h1{
    font-size:60px;
    color:white;
    margin-top:50px;
    animation: glow 2s infinite alternate;
}

@keyframes glow{
    from{ text-shadow:0 0 10px white;}
    to{ text-shadow:0 0 30px yellow;}
}

.message{
    font-size:25px;
    color:white;
    margin:20px;
}

.gallery{
    display:flex;
    justify-content:center;
    gap:20px;
    flex-wrap:wrap;
    margin-top:30px;
}

.gallery img{
    width:250px;
    height:250px;
    object-fit:cover;
    border-radius:20px;
    box-shadow:0 0 15px black;
    transition:0.5s;
}

.gallery img:hover{
    transform:scale(1.1);
}

.heart{
    position:fixed;
    top:-10px;
    color:red;
    animation:fall linear infinite;
}

@keyframes fall{
    to{
        transform:translateY(110vh);
    }
}
</style>
</head>

<body>

<h1>🎂 Happy Birthday ❤️</h1>

<div class="message">
    Wishing you a day filled with love, happiness and lots of cake 🎉  
</div>

<!-- Photo Gallery -->
<div class="gallery">

<img src="photos/photo1.jpg">
<img src="photos/photo2.jpg">
<img src="photos/photo3.jpg">

</div>

<!-- Music -->
<audio autoplay loop>
<source src="music/song.mp3" type="audio/mp3">
</audio>

<script>

// hearts animation
function createHeart(){
const heart=document.createElement("div")
heart.classList.add("heart")
heart.innerHTML="❤️"

heart.style.left=Math.random()*100+"vw"
heart.style.animationDuration=(Math.random()*3+2)+"s"

document.body.appendChild(heart)

setTimeout(()=>{
heart.remove()
},5000)

}

setInterval(createHeart,300)

</script>

</body>
</html>
